<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Channel-4 Beta</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
    <div class="header">
    <h2 id="main-title">Mycotech <span style="color:#3b82f6">Beta</span></h2>
    <div id="status-bar" class="status-pill is-offline">OFFLINE</div>
    </div>
    
    <div class="sub-header">
    <span id="heartbeat-timer">Signal: -- ago</span>
    </div>

    <div id="relay-container">
        
    <div class="relay-box" data-relay="1">
    <div class="relay-label">
    <span class="device-name">Misting AAA</span> <span id="badge-1" class="state-indicator">OFF</span>
    </div>
    <div class="timer-row">
    <label>SEC:</label>
    <input type="number" id="timer-input-1" value="0" min="0">
    <span id="countdown-1" class="countdown"></span>
    </div>
    <div class="btn-group">
    <button id="btn-on-1" class="btn btn-inactive" onclick="publishCommand(1, 'ON')">ON</button>
    <button id="btn-off-1" class="btn btn-off" onclick="publishCommand(1, 'OFF')">OFF</button>
    </div>
    </div>

    <div class="relay-box" data-relay="2">
    <div class="relay-label">
    <span class="device-name">Misting xxx</span> <span id="badge-2" class="state-indicator">OFF</span>
    </div>
    <div class="timer-row">
    <label>SEC:</label>
    <input type="number" id="timer-input-1" value="0" min="0">
    <span id="countdown-1" class="countdown"></span>
    </div>
    <div class="btn-group">
    <button id="btn-on-1" class="btn btn-inactive" onclick="publishCommand(1, 'ON')">ON</button>
    <button id="btn-off-1" class="btn btn-off" onclick="publishCommand(1, 'OFF')">OFF</button>
    </div>
    </div>

    <div class="relay-box" data-relay="3">
    <div class="relay-label">
    <span class="device-name">Misting System</span> <span id="badge-3" class="state-indicator">OFF</span>
    </div>
    <div class="timer-row">
    <label>SEC:</label>
    <input type="number" id="timer-input-1" value="0" min="0">
    <span id="countdown-1" class="countdown"></span>
    </div>
    <div class="btn-group">
    <button id="btn-on-1" class="btn btn-inactive" onclick="publishCommand(1, 'ON')">ON</button>
    <button id="btn-off-1" class="btn btn-off" onclick="publishCommand(1, 'OFF')">OFF</button>
    </div>
    </div>


    <div class="relay-box" data-relay="4">
    <div class="relay-label">
    <span class="device-name">Misting System</span> <span id="badge-4" class="state-indicator">OFF</span>
    </div>
    <div class="timer-row">
    <label>SEC:</label>
    <input type="number" id="timer-input-1" value="0" min="0">
    <span id="countdown-1" class="countdown"></span>
    </div>
    <div class="btn-group">
    <button id="btn-on-1" class="btn btn-inactive" onclick="publishCommand(1, 'ON')">ON</button>
    <button id="btn-off-1" class="btn btn-off" onclick="publishCommand(1, 'OFF')">OFF</button>
    </div>
    </div>
        

        </div>
    
    <button class="log-btn" id="toggle-log-btn">SHOW SYSTEM LOG</button>
    <div id="debug-log"></div>
</div>
    <script src="script.js"></script>
</body></html>
