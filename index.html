<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mycotech | Beta Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; }
        .status { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; margin-bottom: 20px; display: inline-block; }
        .disconnected { background: #cf6679; color: white; }
        .connected { background: #03dac6; color: black; }
        button { background: #bb86fc; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #9965f4; }
        button:active { transform: scale(0.98); }
        h1 { margin-bottom: 5px; color: #bb86fc; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Smart-Hub <small>BETA</small></h1>
        <div id="mqtt-status" class="status disconnected">MQTT Disconnected</div>
        
        <div id="controls">
            <p>Fruiting Room Controls</p>
            <button onclick="toggleRelay(1)">Toggle Relay 1</button>
            <button onclick="toggleRelay(2)">Toggle Relay 2</button>
        </div>
    </div>

    <script>
        // Simple function placeholder for your MQTT logic
        function toggleRelay(id) {
            console.log("Toggling relay: " + id);
            alert("Action sent for Relay " + id);
            // Your Paho MQTT 'publish' code goes here
        }

        // Simulating a connection for visual check
        setTimeout(() => {
            const status = document.getElementById('mqtt-status');
            status.innerText = "MQTT Connected (Simulated)";
            status.classList.remove('disconnected');
            status.classList.add('connected');
        }, 2000);
    </script>
</body>
</html>
